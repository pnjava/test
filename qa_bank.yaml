- id: QB059
  domain: CDC/Data
  question: Which CDC approach has been selected for DG?
  answerable: P
  answer: OPEN decision. Page 1 rates RDRS (Rocket Data Replicate & Sync) as best; pages 3/7 recommend the application-level

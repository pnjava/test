  - '01'
  - '03'
  - register
  decision_status: OPEN
  suggested_sme: Rakesh / Ali / data strategy team
  priority: High
  kb_version: seed-v1
- id: QB060
  domain: CDC/Data
  question: Why can't standard log-based CDC be used on DG?
  answerable: Y
  answer: MVDB exposes no usable redo/WAL logs, so CDC must be application-level - changes are captured in UniBASIC and persisted
    to a Transactional Outbox that serves as the authoritative change log.
  citations:
  - '03'
  decision_status: null
  suggested_sme: null
  priority: High
  kb_version: seed-v1
- id: QB061
  domain: CDC/Data
  question: What are the five non-negotiable CDC principles?
  answerable: Y
  answer: 1) CDC must be application-level; 2) Kafka is the system of record for change events, not MongoDB; 3) events are
    immutable/replayable; 4) MongoDB is a projection, not source of truth; 5) idempotency is mandatory.
  citations:
  - '03'
  decision_status: null
  suggested_sme: null
  priority: High
  kb_version: seed-v1
- id: QB062
  domain: CDC/Data
  question: How does the Transactional Outbox work?
  answerable: Y
  answer: UniBASIC WRITE/DELETE wrappers (or file triggers) call a CDC handler that writes one OUTBOX record atomically in
    the same MV transaction; a background publisher polls STATUS=NEW, publishes to per-entity Kafka topics, marks SENT; consumers
    upsert idempotently into MongoDB; full rebuild via offset replay.
  citations:
  - '03'
  decision_status: null
  suggested_sme: null
  priority: High
  kb_version: seed-v1
- id: QB063
  domain: CDC/Data
  question: Which entity should be first for CDC?
  answerable: P

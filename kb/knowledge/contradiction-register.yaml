decisions:
- id: CDC-PATTERN
  topic: CDC approach for DG -> Kafka -> MongoDB
  status: open
  options:
  - name: Rocket Data Replicate & Sync (RDRS)
    status: recommended
    evidence: 'Page 1 ratings table: ''***** Best — Enterprise-grade CDC, ideal for AIX->Linux replication'''
    source:
    - 01-cdc-options-and-gcp-connectivity
  - name: Transactional Outbox (application-level, UniBASIC)
    status: recommended
    evidence: 'Pages 3/7 full reference architecture: ''[Recommended Pattern: Application-Level Outbox]... most
      stable, widely adopted MVDB CDC pattern'''
    source:
    - 03-cdc-transactional-outbox-reference
  - name: MVX:Performance replication
    status: evaluated
    evidence: 'Page 1: **** Native MV replication layer'
    source:
    - 01-cdc-options-and-gcp-connectivity
  - name: Trigger-based CDC (audit logging)
    status: evaluated
    evidence: 'Page 1: *** targeted event capture; pages 3/7: ''risky without Outbox'''
    source:
    - 1
    - 3
  - name: API-level via MVIS
    status: evaluated
    evidence: 'Page 1: ** not CDC, good for app modernization'
    source:
    - 1
  - name: Polling
    status: rejected
    evidence: 'Page 1: ''x — Not appropriate for MV scale'''
    source:
    - 1
  reconciliation_hypothesis: Docs note U2 replication (HA/DR) and Outbox CDC (integration) are 'complementary, not
    interchangeable' — RDRS may be transport/replication while Outbox provides business-semantic events. UNCONFIRMED.

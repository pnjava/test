# PHI/PII Detection Patterns for EAIP Ingestion Scanner
# Each pattern: name, regex, description, severity
# severity: high = always quarantine; medium = quarantine unless allowlisted

patterns:
  - name: ssn_dashed
    regex: '\b\d{3}-\d{2}-\d{4}\b'
    description: "Social Security Number (XXX-XX-XXXX)"
    severity: high

  - name: ssn_bare
    regex: '\b(?!000|666|9\d{2})\d{3}(?!00)\d{2}(?!0000)\d{4}\b'
    description: "Bare 9-digit SSN (excludes invalid prefixes 000/666/9xx)"
    severity: medium

  - name: member_id
    regex: '\b(?:MBR|MEM|MTN)[-]?\d{6,10}\b'
    description: "Member ID pattern (MBR/MEM/MTN prefix + 6-10 digits) — confirm actual Meritain format with team"
    severity: high

  - name: dob_with_name
    regex: '(?i)\b(?:DOB|date of birth|born)[:\s]*(?:0?[1-9]|1[0-2])[/-](?:0?[1-9]|[12]\d|3[01])[/-](?:19|20)\d{2}\b'
    description: "DOB label followed by a date (proxy for DOB+name combos)"
    severity: high

  - name: personal_email
    regex: '(?i)\b[A-Za-z0-9._%+-]+@(?!(?:aetna|cvshealth|meritain|example)\.com)[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
    description: "Email address NOT on corporate allowlist (member/personal emails)"
    severity: medium

# Corporate domains treated as internal-business, not member PII.
# Adjust this list as needed — it is baked into the personal_email regex above
# via negative lookahead; keep the two in sync.
allowlist_domains:
  - aetna.com
  - cvshealth.com
  - meritain.com
  - example.com

# Golden Question Set for EAIP MVP
# Purpose: Establish ground truth before building the KB
# Questions are sourced from Meritain integration architecture, RCS initiative, and IMI complexity analysis
# Date: 2026-07-11

questions:
  - id: q001
    question: What is the primary difference between the Aetna integration (EPH-based) and the Meritain integration (IMI-based)?
    expected_answer: Aetna uses EPH (Enterprise Provider Hub) as the source system, while Meritain uses IMI (Individual Member IMI). These are different systems with different APIs, event structures, and business logic, requiring separate integration efforts rather than a simple copy of the Aetna implementation.
    source_artifact: Estimate_Impact_Summary.md
    known_answer: true
    confidence: verified

  - id: q002
    question: What is the estimated effort multiplier for the Meritain IMI integration compared to a baseline new feature?
    expected_answer: "3-5x multiplier compared to a typical new API integration effort. The estimate ranges from 7-8 weeks (optimistic) to 14-16 weeks (pessimistic), with a nominal 10-12 weeks."
    source_artifact: Estimate_Impact_Summary.md
    known_answer: true
    confidence: verified

  - id: q003
    question: What are the 5 key complexity factors that make Meritain-IMI integration different from a simple add-on to Aetna?
    expected_answer: "1) NEW EVENT SOURCE - IMI vs EPH event structures differ; 2) PROXY ID RESOLUTION - requires lookup and possibly async processing; 3) CROSS-BUSINESS-UNIT scenarios - same individual in both Meritain and Aetna; 4) DATA MODEL DIFFERENCES - field mappings not 1:1; 5) TESTING MULTIPLIER - requires cross-BU test scenarios."
    source_artifact: Estimate_Impact_Summary.md
    known_answer: true
    confidence: verified

  - id: q004
    question: What is the RCS Meritain initiative trying to accomplish?
    expected_answer: "Enable Meritain Health to send RCS/SMS/Email welcome and onboarding messages to newly enrolled members, with proper consent management and TCPA compliance."
    source_artifact: Meritain_RCS_Solution_Architecture.md
    known_answer: true
    confidence: verified

  - id: q005
    question: What are the two phases (Day 1 and Day 2) of the Meritain RCS implementation strategy?
    expected_answer: "Day 1 (tactical): Use DataVision/EDP as preference source, with local SQL database for preference storage. Day 2 (strategic): Migrate to IPP (Intelligent Preference Platform) as the Book of Record, sunsetting the local SQL database."
    source_artifact: Meritain_RCS_Solution_Architecture.md
    known_answer: true
    confidence: verified

  - id: q006
    question: What systems currently collect and manage member preferences in the Meritain ecosystem?
    expected_answer: "CSI Web (ASP.NET/SQL Server), Meritain Connect, Plan Sponsor Enrollment Files, and DG (Digital Gateway/Data Governance) system. Day 1 uses local SQL; Day 2 will use IPP as the authoritative source."
    source_artifact: Meritain_RCS_Solution_Architecture.md
    known_answer: true
    confidence: verified

  - id: q007
    question: What is IPP (Intelligent Preference Platform) and what role does it play?
    expected_answer: "IPP is an enterprise CVS/Aetna platform that will serve as the Book of Record for all member preferences and consent. It stores member preferences, manages prior express consent with audit trail, provides preference lookup APIs for MaCE, handles unsubscribe/opt-out, and performs DNC/RND checks."
    source_artifact: Meritain_RCS_Solution_Architecture.md
    known_answer: true
    confidence: verified

  - id: q008
    question: What is DataVision/EDP and what is its purpose in Day 1 of the RCS implementation?
    expected_answer: "DataVision/EDP is the preference source of truth for Day 1. It aggregates preferences from DG, IPP (BoR), and local SQL database. In Day 2, it will be sunset by IPP as the single source of truth."
    source_artifact: Meritain_RCS_Solution_Architecture.md
    known_answer: true
    confidence: verified

  - id: q009
    question: What messaging platforms will Meritain use to deliver communications to members?
    expected_answer: "Infobip (for RCS), CSG (for SMS), and Salesforce (for Email), orchestrated through the MaCE (Messaging and Communication Engine) platform."
    source_artifact: Meritain_RCS_Solution_Architecture.md
    known_answer: true
    confidence: verified

  - id: q010
    question: What are the key fields required in the proposed SQL schema for Day 1 member preferences?
    expected_answer: "MemberID, PlanSponsorID, CellPhone, Email, SMSConsentFlag, RCSConsentFlag, EmailConsentFlag, EOBPreference (EMAIL/PAPER/BOTH), ConsentSource, ConsentTimestamp, ConsentType (TRANSACTIONAL/MARKETING), CreatedDate, ModifiedDate, IsActive."
    source_artifact: Meritain_RCS_Solution_Architecture.md
    known_answer: true
    confidence: verified


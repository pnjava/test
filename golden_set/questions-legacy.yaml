    known_answer: true
    confidence: verified

  - id: q012
    question: What is the testing strategy for the cross-business-unit scenarios in Meritain-Aetna integration?
    expected_answer: "Testing is split into three parts: ~40% for Aetna data scenarios, ~40% for Meritain data scenarios, and ~20% for cross-BU scenarios where the same individual appears in both systems with different Proxy IDs. This multiplies total testing effort by ~60%."
    source_artifact: Estimate_Impact_Summary.md
    known_answer: true
    confidence: verified


# System Name Alias Registry (T2.1)
#
# canonical_name -> aliases, with status:
#   confirmed = the NAME appears verbatim in a source artifact; listed aliases
#               are verbatim-documented equivalences (evidence cited)
#   pending   = the name itself is speculative; needs human/SME confirmation
# proposed_aliases = equivalences that are plausible but NOT verbatim-documented;
#   ignored by the chunker/retriever until a human moves them into `aliases`.
#
# RULES:
# - The scanner (src/alias_scanner.py) NEVER writes to this file. New names and
#   merge candidates go to knowledge/aliases_pending.yaml for human review.
# - Chunker/retriever (M3) resolve aliases to canonical_name using CONFIRMED
#   entries only.

